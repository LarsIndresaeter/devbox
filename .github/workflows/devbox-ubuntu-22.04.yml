name: Build and Push Docker Image from Tag

on:
  push:
    tags:
      - '*.*.*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Needed to write to GitHub Packages (GHCR)

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Log in to the Container registry
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }} # GITHUB_TOKEN has necessary permissions

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository }}-ubuntu-22.04
          tags: ${{ steps.meta.outputs.tags }} # Uses the tags generated by the metadata action

      - name: Build and push Docker image
        uses: docker/build-push-action@v7
        with:
          context: .
          file: ./dockerfiles/ubuntu-22.04/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }} # Uses the tags generated by the metadata action
          labels: ${{ steps.meta.outputs.labels }}
